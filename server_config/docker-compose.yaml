services:
  mc-server:
    image: itzg/minecraft-server:latest
    container_name: mc-server
    hostname: mc-server
    restart: unless-stopped
    tty: true
    stdin_open: true
    env_file:
      - mc-srv.env
      - extras/mr-projects.env
    networks:
      mc-network:
        ipv4_address: 172.18.0.2
    environment:
      CF_API_KEY: ${CF_API_KEY}
      RCON_PASSWORD: ${RCON_PASSWORD}
      MOTD: ${MOTD}
    volumes:
      - "./data:/data"
      - "./downloads:/downloads"
      - "./extras:/extras"
      - "./srv-icon.png:/srv-icon.png"
    ports:
      - "25565:25565"

  arrcon:
    build: ./arrcon
    container_name: arrcon
    hostname: arrcon
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      mc-network:
        ipv4_address: 172.18.0.3
    depends_on:
      mc-server:
        condition: service_healthy
    environment:
      RCON_PASSWORD: ${RCON_PASSWORD}

networks:
  mc-network:
    name: mc-internal-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16